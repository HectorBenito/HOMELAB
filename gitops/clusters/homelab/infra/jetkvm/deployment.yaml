apiVersion: apps/v1
kind: Deployment
metadata:
  name: jetkvm-cloud
  namespace: jetkvm
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: jetkvm-cloud
  template:
    metadata:
      labels:
        app: jetkvm-cloud
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/timothystewart6/cloud-api:0.0.3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - npx prisma migrate deploy
          envFrom:
            - secretRef:
                name: jetkvm-cloud-env

      containers:
        - name: jetkvm-cloud
          image: ghcr.io/timothystewart6/cloud-api:0.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: jetkvm-cloud-env

          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi