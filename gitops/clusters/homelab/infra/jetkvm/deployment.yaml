apiVersion: apps/v1
kind: Deployment
metadata:
  name: jetkvm-cloud
  namespace: jetkvm
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: jetkvm-cloud
  template:
    metadata:
      labels:
        app: jetkvm-cloud
    spec:
      volumes:
        - name: app-src
          emptyDir: {}

      initContainers:
        - name: fetch-source
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eux
              apk add --no-cache curl unzip
              mkdir -p /work
              curl -L https://github.com/timothystewart6/cloud-api/archive/refs/tags/0.0.3.zip -o /tmp/cloud-api.zip
              unzip /tmp/cloud-api.zip -d /work
              mv /work/cloud-api-0.0.3 /work/src
              ls -lah /work/src
          volumeMounts:
            - name: app-src
              mountPath: /work

        - name: build-app
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /work/src
          command:
            - /bin/sh
            - -c
            - |
              set -eux
              apk add --no-cache python3 make g++
              npm ci
              npx prisma generate
              npm run build
          volumeMounts:
            - name: app-src
              mountPath: /work

        - name: migrate
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /work/src
          command:
            - /bin/sh
            - -c
            - |
              set -eux
              apk add --no-cache python3 make g++
              npm ci
              npx prisma migrate deploy
          envFrom:
            - secretRef:
                name: jetkvm-cloud-env
          volumeMounts:
            - name: app-src
              mountPath: /work

      containers:
        - name: jetkvm-cloud
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /work/src
          command:
            - /bin/sh
            - -c
            - |
              set -eux
              node dist/index.js
          envFrom:
            - secretRef:
                name: jetkvm-cloud-env
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: app-src
              mountPath: /work

          startupProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 30

          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12

          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi