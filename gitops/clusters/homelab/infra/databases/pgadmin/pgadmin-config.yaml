apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-config
  namespace: pgadmin
data:
  config_local.py: |
    import os

    AUTHENTICATION_SOURCES = ['oauth2', 'internal']
    MASTER_PASSWORD = True
    OAUTH2_AUTO_CREATE_USER = True

    OAUTH2_CONFIG = [{
        'OAUTH2_NAME': 'authentik',
        'OAUTH2_DISPLAY_NAME': 'Authentik',
        'OAUTH2_CLIENT_ID': os.environ.get('PGADMIN_OAUTH2_CLIENT_ID'),
        'OAUTH2_CLIENT_SECRET': os.environ.get('PGADMIN_OAUTH2_CLIENT_SECRET'),

        'OAUTH2_SERVER_METADATA_URL': 'https://auth.nasbenito.com/application/o/pgadmin/.well-known/openid-configuration',
        'OAUTH2_AUTHORIZATION_URL': 'https://auth.nasbenito.com/application/o/authorize/',
        'OAUTH2_TOKEN_URL': 'https://auth.nasbenito.com/application/o/token/',
        'OAUTH2_USERINFO_ENDPOINT': 'https://auth.nasbenito.com/application/o/userinfo/',

        'OAUTH2_SCOPE': 'openid email profile',
        'OAUTH2_USERNAME_CLAIM': 'preferred_username',
        'OAUTH2_SSL_CERT_VERIFICATION': True
    }]