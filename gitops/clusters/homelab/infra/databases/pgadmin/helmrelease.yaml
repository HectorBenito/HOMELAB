apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin4
  namespace: pgadmin
spec:
  interval: 30m
  chart:
    spec:
      chart: pgadmin4
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: runix
        namespace: pgadmin
  values:
    existingSecret: pgadmin-admin

    env:
      email: hector_admin@nasbenito.com
      pgpassfile: /var/lib/pgadmin/storage/pgadmin/pg-main.pgpass
    
    extraSecretMounts:
      - name: pgpassfile
        secret: pgadmin-db-credentials
        subPath: pgpass
        mountPath: "/var/lib/pgadmin/storage/pgadmin/pg-main.pgpass"
        readOnly: true

    replicaCount: 1

    strategy:
      type: Recreate

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 5050
      fsGroup: 5050
      fsGroupChangePolicy: "OnRootMismatch"
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    serverDefinitions:
      enabled: true
      resourceType: Secret
      existingSecret: pgadmin-servers
    
    persistentVolume:
      enabled: false

    service:
      type: ClusterIP
      port: 80

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
