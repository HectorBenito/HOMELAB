apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin4
  namespace: pgadmin
spec:
  interval: 30m
  chart:
    spec:
      chart: pgadmin4
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: runix
        namespace: pgadmin
  values:
    existingSecret: pgadmin-admin

    env:
      email: hector_admin@nasbenito.com

    envVarsFromSecrets:
      - pgadmin-oidc-secret
    
    extraConfigmapMounts:
      - name: config-local
        configMap: pgadmin-config
        mountPath: /pgadmin4/config_local.py
        subPath: config_local.py
        readOnly: true

    extraSecretMounts:
      - name: pgpassfile
        secret: pgadmin-db-credentials
        subPath: pgpass
        mountPath: /tmp/.pgpass
        readOnly: true

    extraInitContainers: |
      - name: setup-pgpass
        image: dpage/pgadmin4:latest
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            cp /tmp/.pgpass /var/lib/pgadmin/.pgpass
            chown 5050:5050 /var/lib/pgadmin/.pgpass
            chmod 600 /var/lib/pgadmin/.pgpass
            mkdir -p /var/lib/pgadmin/storage
            for d in /var/lib/pgadmin/storage/*; do
              if [ -d "$d" ]; then
                cp /tmp/.pgpass "$d/.pgpass"
                chown 5050:5050 "$d/.pgpass"
                chmod 600 "$d/.pgpass"
              fi
            done
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: pgadmin-data
            mountPath: /var/lib/pgadmin
          - name: pgpassfile
            mountPath: /tmp/.pgpass
            subPath: pgpass

    replicaCount: 1

    strategy:
      type: Recreate

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 5050
      runAsGroup: 5050
      fsGroup: 5050
      fsGroupChangePolicy: "OnRootMismatch"
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    serverDefinitions:
      enabled: true
      resourceType: Secret
      existingSecret: pgadmin-servers
    
    persistentVolume:
      enabled: true
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: longhorn

    service:
      type: ClusterIP
      port: 80

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
