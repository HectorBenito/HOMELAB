apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-main
  namespace: postgres
spec:
  instances: 3

  enableSuperuserAccess: true

  affinity:
    podAntiAffinityType: required

  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 12Gi

  env:
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"

  storage:
    storageClass: longhorn
    size: 200Gi

  postgresql:
    parameters:
      shared_buffers: "2GB"
      effective_cache_size: "8GB"
      maintenance_work_mem: "512MB"
      wal_compression: "on"
      max_wal_size: "8GB"
      min_wal_size: "1GB"
      max_connections: "300"

  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: pg-main-minio

