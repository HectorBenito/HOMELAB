apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 10m
  chart:
    spec:
      chart: headlamp
      version: "0.40.x"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 1h

  values:
    replicaCount: 1

    service:
      type: ClusterIP
      port: 80

    env:
    - name: HEADLAMP_CONFIG_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: client-id
    - name: HEADLAMP_CONFIG_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: client-secret
    - name: HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL
      value: "https://auth.nasbenito.com/application/o/headlamp/"
    - name: HEADLAMP_CONFIG_OIDC_SCOPES
      value: "openid,profile,email,groups"

    config:
      inCluster: true

    serviceAccount:
      create: true
      name: headlamp

    rbac:
      create: true
