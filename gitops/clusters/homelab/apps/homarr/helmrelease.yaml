apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homarr
  namespace: homarr
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: homarr
      version: "8.14.1"
      sourceRef:
        kind: HelmRepository
        name: homarr-labs
        namespace: homarr
      interval: 1h

  values:
    replicaCount: 1
    
    database:
      type: postgresql
      migrationEnabled: true

    persistence:
      homarrDatabase:
        enabled: false

    ingress:
      enabled: false

    env:
      TZ: "Europe/Madrid"

      BASE_URL: "https://nasbenito.com"
      NEXTAUTH_URL: "https://nasbenito.com"
      AUTH_PROVIDERS: "oidc"
      AUTH_OIDC_FORCE_USERINFO: "true"
      AUTH_OIDC_CLIENT_NAME: "Authentik"
      AUTH_OIDC_ISSUER: "https://auth.nasbenito.com/application/o/homarr/"
      AUTH_OIDC_URI: "https://auth.nasbenito.com/application/o/authorize"
      AUTH_OIDC_SCOPE_OVERWRITE: "openid email profile groups"
      AUTH_OIDC_GROUPS_ATTRIBUTE: "groups"
      AUTH_OIDC_AUTO_LOGIN: "false"
      AUTH_LOGOUT_REDIRECT_URL: "https://auth.nasbenito.com/application/o/homarr/end-session/"
