apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authentik-ldap-tls
  namespace: authentik
spec:
  secretName: authentik-ldap-tls
  issuerRef:
    name: letsencrypt-dns01
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - ldap.local.nasbenito.com
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - digital signature
    - key encipherment
    - server auth